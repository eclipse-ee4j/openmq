name: "Eclipse OpenMQ CodeQL"

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze code
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['java']

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Initialize CodeQL (${{ matrix.language }})
      uses: github/codeql-action/init@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
      with:
        languages: ${{ matrix.language }}

    - name: Build OpenMQ
      run: ./mvnw -V -ntp -f mq/main clean package -DskipTests -DskipSBOM

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0

